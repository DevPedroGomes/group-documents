name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Placeholders p/ env_file referenciados (compose parsing; .env real vive na VPS)
        run: |
          python3 - <<'EOF'
          import yaml, pathlib
          d = yaml.safe_load(open("docker-compose.yml")) or {}
          for s in (d.get("services") or {}).values():
              ef = (s or {}).get("env_file")
              if not ef:
                  continue
              for it in (ef if isinstance(ef, list) else [ef]):
                  p = it.get("path") if isinstance(it, dict) else it
                  fp = pathlib.Path(p)
                  fp.parent.mkdir(parents=True, exist_ok=True)
                  fp.touch()
          pathlib.Path(".env").touch()
          EOF
      - name: Build + push (so os servicos buildados, nao upstream)
        run: |
          docker compose build
          docker compose push backend frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH deploy (retry no i/o timeout de rede runner->VPS)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 600 /dev/stdin "$HOME/deploy_key" <<< "$VPS_SSH_KEY"
          REMOTE='set -eu; cd /opt/showcase/group-documents; if [ -f .deploy-freeze ]; then echo "Freeze ativo, abortando deploy"; exit 1; fi; git fetch origin; git reset --hard origin/main; docker compose pull; docker compose up -d --remove-orphans; docker image prune -f || true; docker compose ps'
          set +e
          for i in 1 2 3 4 5; do
            ssh -i "$HOME/deploy_key" -o ConnectTimeout=30 -o BatchMode=yes -o StrictHostKeyChecking=accept-new "$VPS_USER@$VPS_HOST" "$REMOTE"
            rc=$?
            [ "$rc" -eq 0 ] && { echo "deploy OK (tentativa $i)"; exit 0; }
            [ "$rc" -ne 255 ] && { echo "::error::deploy falhou no servidor (rc=$rc) — sem retry"; exit "$rc"; }
            echo "::warning::SSH nao conectou (rc=255 timeout), tentativa $i/5 — retry em 20s"
            sleep 20
          done
          echo "::error::SSH falhou apos 5 tentativas (rota runner->VPS instavel)"
          exit 1
